services:
  db:
    image: postgres:16-alpine
    container_name: vulnreport-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vulnreport-net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vulnreport-web
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./app:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      # Acces au daemon Docker pour le dashboard admin (stats conteneurs). A evaluer selon votre politique de securite.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vulnreport-net

  nginx:
    image: nginx:1.27-alpine
    container_name: vulnreport-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    networks:
      - vulnreport-net

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  vulnreport-net:
    driver: bridge

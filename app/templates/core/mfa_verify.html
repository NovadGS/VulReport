{% extends "base.html" %}
{% block title %}Valider 2FA{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="mb-4">
            <h1 class="h3 mb-1">Valider la 2FA</h1>
            <p class="text-muted mb-0">Entre le code TOTP (6 chiffres).</p>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}
                    <label class="form-label" for="code">Code</label>
                    <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code"
                           class="form-control" placeholder="123456" required autofocus>
                    <div class="mt-3 d-flex gap-2">
                        <button class="btn btn-primary" type="submit">Valider</button>
                        <a class="btn btn-outline-secondary" href="{% url 'logout' %}">Se déconnecter</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

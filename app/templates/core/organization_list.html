{% extends "base.html" %}
{% block title %}Organisations{% endblock %}
{% block content %}
<div class="row g-4">
    <div class="col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h1 class="h5">Créer une organisation</h1>
                <form method="post" action="{% url 'organization_create' %}">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Créer</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h2 class="h5">Mes organisations</h2>
                {% for org in organizations %}
                    <div class="border rounded p-3 mb-2 d-flex justify-content-between align-items-center">
                        <div>{{ org.name }}</div>
                        <a class="btn btn-sm btn-outline-primary" href="{% url 'organization_detail' org.id %}">Gérer</a>
                    </div>
                {% empty %}
                    <div class="alert alert-secondary mb-0">Aucune organisation.</div>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

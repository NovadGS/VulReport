{% extends "base.html" %}
{% block title %}{% if is_edit %}Modifier le rapport{% else %}Nouveau rapport{% endif %}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">{% if is_edit %}Modifier le rapport{% else %}Creer un rapport{% endif %}</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Enregistrer</button>
                        <a class="btn btn-outline-secondary" href="{% url 'home' %}">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

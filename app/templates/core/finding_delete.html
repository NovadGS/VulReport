{% extends "base.html" %}
{% block title %}Supprimer finding{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Supprimer le finding</h1>
                <p>Confirmer la suppression de <strong>{{ finding.title }}</strong> ?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Supprimer</button>
                        <a class="btn btn-outline-secondary" href="{% url 'report_detail' report.id %}">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

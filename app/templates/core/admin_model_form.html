{% extends "base.html" %}
{% block title %}{% if is_edit %}Editer{% else %}Creer{% endif %} {{ model_label }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0">{% if is_edit %}Editer{% else %}Creer{% endif %} {{ model_label }}</h1>
            <a href="{% url 'admin_model_list' model_slug=model_slug %}" class="btn btn-outline-secondary btn-sm">Retour</a>
        </div>
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

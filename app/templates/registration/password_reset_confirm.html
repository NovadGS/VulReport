{% extends "base.html" %}
{% block title %}Nouveau mot de passe{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h1 class="h5 mb-3">Choisir un nouveau mot de passe</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100" type="submit">Mettre a jour</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Reinitialiser le mot de passe{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h1 class="h5 mb-3">Reinitialiser le mot de passe</h1>
                <form method="post">
                    {% csrf_token %}
                    <label class="form-label" for="{{ form.email.id_for_label }}">Email</label>
                    {{ form.email }}
                    <button class="btn btn-primary w-100 mt-3" type="submit">Envoyer le lien</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

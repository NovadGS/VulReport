name: Security CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  sast-and-sca:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit semgrep

      - name: Semgrep (SAST + CI rules)
        run: semgrep scan --config p/security-audit --config p/python --config p/django --config p/secrets app/

      - name: Bandit (SAST Python)
        run: bandit -r app -f txt -ll

      - name: pip-audit (SCA Python deps)
        run: pip-audit -r requirements.txt

      - name: GitLeaks (secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-image-scan:
    runs-on: ubuntu-latest
    needs: sast-and-sca
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vulnreport:${{ github.sha }} .

      - name: Trivy scan image (high/critical)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: vulnreport:${{ github.sha }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"

  snyk-dependencies:
    runs-on: ubuntu-latest
    needs: sast-and-sca
    steps:
      - name: Check Snyk token
        id: check
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Snyk
        if: steps.check.outputs.skip == 'false'
        run: npm install -g snyk

      - name: Snyk test (dependencies)
        if: steps.check.outputs.skip == 'false'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth "${SNYK_TOKEN}"
          snyk test --file=requirements.txt --package-manager=pip

      - name: Skip notice
        if: steps.check.outputs.skip == 'true'
        run: echo "Snyk skipped - SNYK_TOKEN not configured"

  sonarqube:
    runs-on: ubuntu-latest
    needs: sast-and-sca
    steps:
      - name: Check SonarQube tokens
        id: check
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ] || [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        if: steps.check.outputs.skip == 'false'
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Skip notice
        if: steps.check.outputs.skip == 'true'
        run: echo "SonarQube skipped - SONAR_TOKEN/SONAR_HOST_URL not configured"

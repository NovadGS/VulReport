name: Pipeline Securite CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  analyse-code-et-deps:
    name: Analyse SAST + SCA
    runs-on: ubuntu-latest
    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installation Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dependances projet
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Installation outils de securite
        run: pip install bandit pip-audit 'semgrep>=1.90.0'

      - name: Analyse statique Semgrep (SAST)
        run: semgrep scan --config p/security-audit --config p/python --config p/django --config p/secrets app/

      - name: Analyse statique Bandit (SAST Python)
        run: bandit -r app -f txt -ll

      - name: Audit des dependances pip-audit (SCA)
        run: pip-audit -r requirements.txt

      - name: Detection de secrets GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  scan-image-docker:
    name: Scan image Docker Trivy
    runs-on: ubuntu-latest
    needs: analyse-code-et-deps
    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Construction de l'image Docker
        run: docker build -t vulnreport:${{ github.sha }} .

      - name: Installation de Trivy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq trivy

      - name: Scan Trivy (vulnerabilites high/critical)
        run: trivy image --ignore-unfixed --vuln-type os,library --severity HIGH,CRITICAL --exit-code 0 --format table vulnreport:${{ github.sha }}

  analyse-snyk:
    name: Analyse dependances Snyk
    runs-on: ubuntu-latest
    needs: analyse-code-et-deps
    steps:
      - name: Verification token Snyk
        id: check
        run: |
          if [ -z "${{ secrets.SNYK_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Recuperation du code
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Installation Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation Snyk CLI
        if: steps.check.outputs.skip == 'false'
        run: npm install -g snyk

      - name: Test des dependances avec Snyk
        if: steps.check.outputs.skip == 'false'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth "${SNYK_TOKEN}"
          snyk test --file=requirements.txt --package-manager=pip

      - name: Snyk non configure
        if: steps.check.outputs.skip == 'true'
        run: echo "Snyk ignore - token pas configure"

  analyse-sonarqube:
    name: Analyse qualite SonarQube
    runs-on: ubuntu-latest
    needs: analyse-code-et-deps
    steps:
      - name: Verification tokens SonarQube
        id: check
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ] || [ -z "${{ secrets.SONAR_HOST_URL }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Recuperation du code
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lancement scan SonarQube
        if: steps.check.outputs.skip == 'false'
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube non configure
        if: steps.check.outputs.skip == 'true'
        run: echo "SonarQube ignore - tokens pas configures"

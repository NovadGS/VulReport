name: Tests DAST et Fuzzing

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 1"

permissions:
  contents: read

jobs:
  tests-dynamiques:
    name: OWASP ZAP + ffuf
    runs-on: ubuntu-latest
    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Preparation du .env pour la CI
        run: |
          cat > .env << 'EOF'
          DJANGO_SECRET_KEY=ci-only-secret-key-please-change
          DJANGO_DEBUG=False
          DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
          DJANGO_CSRF_TRUSTED_ORIGINS=http://localhost,http://127.0.0.1
          DJANGO_SETTINGS_MODULE=config.settings
          POSTGRES_DB=vulnreport
          POSTGRES_USER=vulnreport
          POSTGRES_PASSWORD=vulnreport
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          SECURE_SSL_REDIRECT=False
          SESSION_COOKIE_SECURE=False
          CSRF_COOKIE_SECURE=False
          EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
          EOF

      - name: Demarrage de la stack Docker
        run: docker compose up -d --build

      - name: Attente que l'appli soit prete
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost/ > /dev/null 2>&1; then
              echo "Appli demarree"
              exit 0
            fi
            sleep 5
          done
          echo "L'appli n'a pas demarre a temps"
          docker compose logs --tail 200
          exit 1

      - name: Scan OWASP ZAP baseline (DAST)
        run: |
          mkdir -p reports
          chmod 777 reports
          docker run --rm --network host \
            -v "${PWD}/reports:/zap/wrk:rw" \
            -u root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost/ -r zap-report.html -J zap-report.json -I || true

      - name: Installation de ffuf
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffuf

      - name: Fuzzing des endpoints avec ffuf
        run: |
          mkdir -p reports
          cat > wordlist.txt << 'EOF'
          admin
          login
          register
          api
          dashboard
          secret
          backup
          .git
          .env
          debug
          EOF
          ffuf -w wordlist.txt -u http://localhost/FUZZ -mc 200,204,301,302,307,401,403 -of json -o reports/ffuf.json || true

      - name: Sauvegarde des rapports DAST
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-dast-fuzz
          path: reports

      - name: Arret de la stack
        if: always()
        run: docker compose down -v

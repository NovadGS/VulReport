name: CD Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Security CI"]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/vulreport:${{ github.sha }}"
          echo "image_tag=$IMAGE" >> "$GITHUB_OUTPUT"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

  deploy-server:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.SSH_HOST != '' && secrets.SSH_USER != '' && secrets.SSH_PRIVATE_KEY != '' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ needs.build-and-push.outputs.image_tag }}
            docker stop vulnreport-web || true
            docker rm vulnreport-web || true
            docker run -d --name vulnreport-web --env-file /opt/vulreport/.env -p 8000:8000 ${{ needs.build-and-push.outputs.image_tag }}

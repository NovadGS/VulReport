name: Deploiement CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Pipeline Securite CI"]
    types: [completed]

permissions:
  contents: read
  packages: write

jobs:
  build-et-push:
    name: Construction et push image Docker
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Connexion au registre GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push de l'image
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/vulnreport:${{ github.sha }}"
          echo "image_tag=$IMAGE" >> "$GITHUB_OUTPUT"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

  deploiement-serveur:
    name: Deploiement sur le serveur
    runs-on: ubuntu-latest
    needs: build-et-push
    steps:
      - name: Verification des secrets SSH
        id: check
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ] || [ -z "${{ secrets.SSH_USER }}" ] || [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploiement via SSH
        if: steps.check.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ needs.build-et-push.outputs.image_tag }}
            docker stop vulnreport-web || true
            docker rm vulnreport-web || true
            docker run -d --name vulnreport-web --env-file /opt/vulreport/.env -p 8000:8000 ${{ needs.build-et-push.outputs.image_tag }}

      - name: SSH non configure
        if: steps.check.outputs.skip == 'true'
        run: echo "Deploiement SSH ignore - secrets pas configures"
